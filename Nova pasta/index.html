<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Geometric NFTs - Visual 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Background com partículas */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; position: relative; }
        
        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }
        
        .subtitle { text-align: center; opacity: 0.7; margin-bottom: 30px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: scale(1.05); }
        .stat-value { font-size: 2em; font-weight: bold; color: #00ffff; }
        .stat-label { opacity: 0.7; margin-top: 5px; }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: white;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:active::before {
            width: 300px;
            height: 300px;
        }
        
        .fusion-panel {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
            backdrop-filter: blur(10px);
        }
        .fusion-panel.active { display: block; animation: slideDown 0.3s ease; }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .selected-nfts {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .selected-nft {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            min-width: 150px;
            text-align: center;
            transition: all 0.3s;
        }
        .selected-nft.empty { border-style: dashed; opacity: 0.5; }
        
        .fusion-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .fusion-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }
        .fusion-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .generations-container { margin-top: 30px; }
        .generation-section { margin-bottom: 40px; }
        .generation-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #00ffff;
            border-bottom: 2px solid #00ffff;
            padding-bottom: 10px;
        }
        
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .nft-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .nft-card:hover {
            transform: translateY(-10px);
            border-color: #00ffff;
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.4);
        }
        .nft-card.selected {
            border-color: #ff00ff;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
            animation: pulse 2s infinite;
        }
        .nft-card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff00ff;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            z-index: 10;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 0, 255, 0.6); }
            50% { box-shadow: 0 0 60px rgba(255, 0, 255, 0.8); }
        }
        
        .nft-card.mutant {
            border-color: #ff00ff;
            animation: mutantGlow 2s infinite;
        }
        
        @keyframes mutantGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 255, 0.5), 0 0 40px rgba(255, 0, 255, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 255, 0.8), 0 0 80px rgba(255, 0, 255, 0.5); }
        }
        
        .nft-svg {
            width: 100%;
            height: 280px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .nft-svg svg {
            animation: rotate 20s linear infinite;
            transition: transform 0.3s;
        }
        
        .nft-card:hover .nft-svg svg {
            animation: rotate 5s linear infinite, scale 1.1 ease;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes scale {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        .nft-info { padding: 15px; }
        .nft-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nft-detail {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.9em;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 2px;
        }
        .badge-gen { background: #00ffff; color: black; }
        .badge-mutant { background: #ff00ff; color: white; animation: badgePulse 1.5s infinite; }
        .badge-shape { background: #ffa500; color: black; }
        
        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .view3d-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ffff;
            border-radius: 20px;
            padding: 5px 15px;
            color: #00ffff;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            z-index: 5;
        }
        .view3d-btn:hover {
            background: #00ffff;
            color: black;
        }
        
        /* Modal 3D */
        .modal-3d {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-3d.active { display: flex; }
        .modal-3d-content {
            width: 90%;
            max-width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 2px solid #00ffff;
            position: relative;
            overflow: hidden;
        }
        #canvas-3d {
            width: 100%;
            height: 100%;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            color: white;
            cursor: pointer;
            background: rgba(255, 0, 0, 0.7);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            z-index: 1001;
        }
        .modal-close:hover { background: rgba(255, 0, 0, 1); }
        
        .loading { text-align: center; padding: 50px; font-size: 1.5em; }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="container">
        <h1>🎨 COSMIC GEOMETRIC NFTs</h1>
        <p class="subtitle">25 Formas + 50 Cores + Visual 3D + Animações</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalEntities">-</div>
                <div class="stat-label">Total de NFTs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalFusions">-</div>
                <div class="stat-label">Total de Fusões</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="maxGeneration">-</div>
                <div class="stat-label">Maior Geração</div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn" onclick="mintNFT()">🎨 MINT NOVO NFT</button>
            <button class="btn" onclick="toggleFusionMode()"> MODO FUSÃO</button>
            <button class="btn" onclick="loadNFTs()">🔄 ATUALIZAR</button>
        </div>
        
        <div class="fusion-panel" id="fusionPanel">
            <h3 style="text-align:center;margin-bottom:20px;color:#ff00ff;">🔥 Selecione 2 NFTs para fundir</h3>
            <div class="selected-nfts">
                <div class="selected-nft empty" id="selected1">
                    <div style="font-size:2em;">?</div>
                    <div>NFT 1</div>
                </div>
                <div style="font-size:2em;">+</div>
                <div class="selected-nft empty" id="selected2">
                    <div style="font-size:2em;">?</div>
                    <div>NFT 2</div>
                </div>
            </div>
            <button class="fusion-btn" id="fuseBtn" onclick="fuseNFTs()" disabled>
                🔥 FUNDIR NFTs SELECIONADOS
            </button>
        </div>
        
        <div id="generationsContainer" class="generations-container"></div>
    </div>
    
    <!-- Modal 3D -->
    <div class="modal-3d" id="modal3d">
        <div class="modal-3d-content">
            <button class="modal-close" onclick="closeModal3D()">✕</button>
            <div id="canvas-3d"></div>
        </div>
    </div>

    <script>
        // Sistema de Partículas no Background
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const particleCount = 100;
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Configuração do Contrato
        const CONTRACT_ADDRESS = "0x578c1650AB432801839D385A54EAae4f4d7a7A7C";
        const RPC_URL = "https://liteforge.rpc.caldera.xyz/http";
        const CHAIN_ID = 4441;
        
        const ABI = [
            "function mintEntity() external returns (uint256)",
            "function fuseNFTs(uint256 tokenId1, uint256 tokenId2) external returns (uint256)",
            "function nextTokenId() external view returns (uint256)",
            "function totalFusions() external view returns (uint256)",
            "function entityDNA(uint256) external view returns (uint256,uint256,uint256,uint256,bool,uint8,uint8,uint8,uint8)",
            "function ownerOf(uint256) external view returns (address)"
        ];
        
        const shapeNames = [
            "Triângulo", "Quadrado", "Retângulo", "Círculo", "Losango",
            "Trapézio", "Paralelogramo", "Pentágono", "Hexágono", "Heptágono",
            "Octógono", "Decágono", "Dodecágono", "Elipse",
            "Cubo", "Esfera", "Cilindro", "Cone", "Pirâmide",
            "Prisma Triangular", "Paralelepípedo", "Tetraedro", "Octaedro",
            "Dodecaedro", "Icosaedro"
        ];
        
        const colorPalette = [
            "#DC143C", "#FF2400", "#E2725B", "#FF00FF", "#FF6EC7",
            "#FFB6C1", "#FA8072", "#FF7F50", "#FFBF00", "#FFEF00",
            "#E1AD01", "#FF9933", "#FFFDD0", "#FFD700", "#50C878",
            "#808000", "#8A9A5B", "#98FF98", "#4B5320", "#BFFF00",
            "#00FFFF", "#000080", "#0047AB", "#40E0D0", "#89CFF0",
            "#005F69", "#4B0082", "#4169E1", "#8B00FF", "#E6E6FA",
            "#800080", "#301934", "#DA70D6", "#7B3F00", "#F5F5DC",
            "#C3B091", "#FFD59A", "#704214", "#CD7F32", "#FFFFFF",
            "#FAF9F6", "#C0C0C0", "#464646", "#000000", "#383838",
            "#722F37", "#E3BC9A", "#FF00FF", "#008080", "#F3E5AB"
        ];
        
        let contract, provider;
        let fusionMode = false;
        let selectedNFTs = [];
        let scene, camera, renderer, currentMesh;
        
        async function init() {
            provider = new ethers.JsonRpcProvider(RPC_URL, { chainId: CHAIN_ID, name: "LitVM" }, { staticNetwork: ethers.Network.from(CHAIN_ID) });
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
            await loadNFTs();
        }
        
        function toggleFusionMode() {
            fusionMode = !fusionMode;
            document.getElementById('fusionPanel').classList.toggle('active', fusionMode);
            if (!fusionMode) {
                selectedNFTs = [];
                updateSelectedDisplay();
            }
        }
        
        function selectNFT(tokenId) {
            if (!fusionMode) return;
            const index = selectedNFTs.indexOf(tokenId);
            if (index > -1) {
                selectedNFTs.splice(index, 1);
            } else {
                if (selectedNFTs.length >= 2) selectedNFTs.shift();
                selectedNFTs.push(tokenId);
            }
            updateSelectedDisplay();
            updateCardSelection();
        }
        
        function updateSelectedDisplay() {
            const sel1 = document.getElementById('selected1');
            const sel2 = document.getElementById('selected2');
            const fuseBtn = document.getElementById('fuseBtn');
            
            if (selectedNFTs.length >= 1) {
                sel1.innerHTML = `<div style="font-size:1.5em;">✨</div><div>NFT #${selectedNFTs[0]}</div>`;
                sel1.classList.remove('empty');
            } else {
                sel1.innerHTML = `<div style="font-size:2em;">?</div><div>NFT 1</div>`;
                sel1.classList.add('empty');
            }
            
            if (selectedNFTs.length >= 2) {
                sel2.innerHTML = `<div style="font-size:1.5em;">✨</div><div>NFT #${selectedNFTs[1]}</div>`;
                sel2.classList.remove('empty');
                fuseBtn.disabled = false;
            } else {
                sel2.innerHTML = `<div style="font-size:2em;">?</div><div>NFT 2</div>`;
                sel2.classList.add('empty');
                fuseBtn.disabled = true;
            }
        }
        
        function updateCardSelection() {
            document.querySelectorAll('.nft-card').forEach(card => {
                card.classList.toggle('selected', selectedNFTs.includes(parseInt(card.dataset.tokenId)));
            });
        }
        
        async function fuseNFTs() {
            if (selectedNFTs.length !== 2) {
                alert("⚠️ Selecione exatamente 2 NFTs!");
                return;
            }
            
            const [token1, token2] = selectedNFTs;
            if (!confirm(`🔥 Fundir NFT #${token1} + NFT #${token2}?`)) return;
            
            try {
                if (!window.ethereum) { alert("️ MetaMask não detectada!"); return; }
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const browserProvider = new ethers.BrowserProvider(window.ethereum);
                const signer = await browserProvider.getSigner();
                const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                alert(`🔥 Fundindo...`);
                const tx = await userContract.fuseNFTs(token1, token2, { gasLimit: 500000 });
                alert("⏳ Transação enviada!");
                await tx.wait();
                alert("✅ Fusão realizada!");
                
                selectedNFTs = [];
                updateSelectedDisplay();
                await loadNFTs();
            } catch (e) {
                alert("❌ Erro: " + e.message);
            }
        }
        
        function generateShapeSVG(shapeType, colorIndex, rotation, size, isMutant) {
            const color = colorPalette[colorIndex] || '#FFFFFF';
            const cx = 140, cy = 140;
            const r = (size || 80) * 0.7;
            
            let shape = '';
            
            switch(shapeType) {
                case 0: shape = `<polygon points="${cx},${cy-r} ${cx+r},${cy+r} ${cx-r},${cy+r}" fill="${color}" opacity="0.8"/>`; break;
                case 1: shape = `<rect x="${cx-r}" y="${cy-r}" width="${r*2}" height="${r*2}" fill="${color}" opacity="0.8"/>`; break;
                case 2: shape = `<rect x="${cx-r*1.5}" y="${cy-r*0.7}" width="${r*3}" height="${r*1.4}" fill="${color}" opacity="0.8"/>`; break;
                case 3: shape = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" opacity="0.8"/>`; break;
                case 4: shape = `<polygon points="${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}" fill="${color}" opacity="0.8"/>`; break;
                case 5: shape = `<polygon points="${cx-r*0.7},${cy-r} ${cx+r*0.7},${cy-r} ${cx+r},${cy+r} ${cx-r},${cy+r}" fill="${color}" opacity="0.8"/>`; break;
                case 6: shape = `<polygon points="${cx-r*0.5},${cy-r} ${cx+r},${cy-r} ${cx+r*0.5},${cy+r} ${cx-r},${cy+r}" fill="${color}" opacity="0.8"/>`; break;
                case 7: shape = generatePolygon(cx, cy, r, 5, color); break;
                case 8: shape = generatePolygon(cx, cy, r, 6, color); break;
                case 9: shape = generatePolygon(cx, cy, r, 7, color); break;
                case 10: shape = generatePolygon(cx, cy, r, 8, color); break;
                case 11: shape = generatePolygon(cx, cy, r, 10, color); break;
                case 12: shape = generatePolygon(cx, cy, r, 12, color); break;
                case 13: shape = `<ellipse cx="${cx}" cy="${cy}" rx="${r*1.3}" ry="${r*0.7}" fill="${color}" opacity="0.8"/>`; break;
                case 14: shape = `<rect x="${cx-r*0.8}" y="${cy-r*0.8}" width="${r*1.6}" height="${r*1.6}" fill="${color}" opacity="0.8"/><rect x="${cx-r*0.5}" y="${cy-r}" width="${r*1.6}" height="${r*1.6}" fill="${color}" opacity="0.4"/>`; break;
                case 15: shape = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" opacity="0.8"/><circle cx="${cx-r*0.3}" cy="${cy-r*0.3}" r="${r*0.2}" fill="white" opacity="0.3"/>`; break;
                case 16: shape = `<ellipse cx="${cx}" cy="${cy-r*0.7}" rx="${r*0.8}" ry="${r*0.3}" fill="${color}" opacity="0.8"/><rect x="${cx-r*0.8}" y="${cy-r*0.7}" width="${r*1.6}" height="${r*1.4}" fill="${color}" opacity="0.6"/><ellipse cx="${cx}" cy="${cy+r*0.7}" rx="${r*0.8}" ry="${r*0.3}" fill="${color}" opacity="0.8"/>`; break;
                case 17: shape = `<polygon points="${cx},${cy-r} ${cx+r},${cy+r} ${cx-r},${cy+r}" fill="${color}" opacity="0.8"/><ellipse cx="${cx}" cy="${cy+r}" rx="${r}" ry="${r*0.3}" fill="${color}" opacity="0.6"/>`; break;
                case 18: shape = `<polygon points="${cx},${cy-r} ${cx+r},${cy+r*0.5} ${cx+r*0.5},${cy+r} ${cx-r*0.5},${cy+r} ${cx-r},${cy+r*0.5}" fill="${color}" opacity="0.8"/>`; break;
                case 19: shape = `<polygon points="${cx},${cy-r} ${cx+r},${cy+r*0.3} ${cx-r},${cy+r*0.3}" fill="${color}" opacity="0.8"/><polygon points="${cx},${cy-r*0.5} ${cx+r},${cy+r*0.8} ${cx-r},${cy+r*0.8}" fill="${color}" opacity="0.5"/>`; break;
                case 20: shape = `<rect x="${cx-r}" y="${cy-r*0.7}" width="${r*2}" height="${r*1.4}" fill="${color}" opacity="0.8"/><rect x="${cx-r*0.7}" y="${cy-r}" width="${r*2}" height="${r*1.4}" fill="${color}" opacity="0.5"/>`; break;
                case 21: shape = `<polygon points="${cx},${cy-r} ${cx+r*0.8},${cy+r*0.6} ${cx-r*0.8},${cy+r*0.6}" fill="${color}" opacity="0.8"/><polygon points="${cx},${cy-r*0.3} ${cx+r*0.5},${cy+r*0.8} ${cx-r*0.5},${cy+r*0.8}" fill="${color}" opacity="0.5"/>`; break;
                case 22: shape = `<polygon points="${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}" fill="${color}" opacity="0.8"/><polygon points="${cx},${cy-r*0.5} ${cx+r*0.7},${cy} ${cx},${cy+r*0.5} ${cx-r*0.7},${cy}" fill="${color}" opacity="0.5"/>`; break;
                case 23: shape = generatePolygon(cx, cy, r, 12, color, 0.8) + generatePolygon(cx, cy, r*0.7, 12, color, 0.5); break;
                case 24: shape = generatePolygon(cx, cy, r, 10, color, 0.8) + generatePolygon(cx, cy, r*0.6, 10, color, 0.5); break;
            }
            
            if (isMutant) {
                shape += `<circle cx="${cx}" cy="${cy}" r="${r*1.2}" fill="none" stroke="#FF00FF" stroke-width="3" opacity="0.8"/>`;
                shape += `<circle cx="${cx}" cy="${cy}" r="${r*1.4}" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.4"/>`;
            }
            
            return `<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">${shape}</svg>`;
        }
        
        function generatePolygon(cx, cy, r, sides, color, opacity = 0.8) {
            const points = [];
            for (let i = 0; i < sides; i++) {
                const angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                points.push(`${x},${y}`);
            }
            return `<polygon points="${points.join(' ')}" fill="${color}" opacity="${opacity}"/>`;
        }
        
        // Visualização 3D com Three.js
        function openModal3D(shapeType, colorIndex, isMutant) {
            const modal = document.getElementById('modal3d');
            modal.classList.add('active');
            
            const container = document.getElementById('canvas-3d');
            container.innerHTML = '';
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            const color = new THREE.Color(colorPalette[colorIndex] || '#FFFFFF');
            const material = new THREE.MeshPhongMaterial({ 
                color: color, 
                shininess: 100,
                emissive: isMutant ? 0xff00ff : 0x000000,
                emissiveIntensity: isMutant ? 0.3 : 0
            });
            
            let geometry;
            switch(shapeType) {
                case 0: geometry = new THREE.ConeGeometry(1, 2, 3); break;
                case 1: geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5); break;
                case 2: geometry = new THREE.BoxGeometry(2, 1, 1); break;
                case 3: geometry = new THREE.SphereGeometry(1, 32, 32); break;
                case 4: geometry = new THREE.OctahedronGeometry(1); break;
                case 5: geometry = new THREE.CylinderGeometry(0.8, 1.2, 1.5, 4); break;
                case 6: geometry = new THREE.BoxGeometry(1.5, 1, 1); break;
                case 7: geometry = new THREE.ConeGeometry(1, 1.5, 5); break;
                case 8: geometry = new THREE.CylinderGeometry(1, 1, 1.5, 6); break;
                case 9: geometry = new THREE.ConeGeometry(1, 1.5, 7); break;
                case 10: geometry = new THREE.CylinderGeometry(1, 1, 1.5, 8); break;
                case 11: geometry = new THREE.CylinderGeometry(1, 1, 1.5, 10); break;
                case 12: geometry = new THREE.CylinderGeometry(1, 1, 1.5, 12); break;
                case 13: geometry = new THREE.SphereGeometry(1, 32, 16); break;
                case 14: geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5); break;
                case 15: geometry = new THREE.SphereGeometry(1, 32, 32); break;
                case 16: geometry = new THREE.CylinderGeometry(0.8, 0.8, 2, 32); break;
                case 17: geometry = new THREE.ConeGeometry(1, 2, 32); break;
                case 18: geometry = new THREE.ConeGeometry(1.2, 2, 4); break;
                case 19: geometry = new THREE.ConeGeometry(1, 2, 3); break;
                case 20: geometry = new THREE.BoxGeometry(2, 1, 1); break;
                case 21: geometry = new THREE.TetrahedronGeometry(1); break;
                case 22: geometry = new THREE.OctahedronGeometry(1); break;
                case 23: geometry = new THREE.DodecahedronGeometry(1); break;
                case 24: geometry = new THREE.IcosahedronGeometry(1); break;
                default: geometry = new THREE.SphereGeometry(1, 32, 32);
            }
            
            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);
            
            camera.position.z = 3;
            
            if (isMutant) {
                const glowMaterial = new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.3 });
                const glowGeometry = new THREE.SphereGeometry(1.5, 32, 32);
                const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
                currentMesh.add(glowMesh);
            }
            
            function animate() {
                requestAnimationFrame(animate);
                if (currentMesh) {
                    currentMesh.rotation.x += 0.01;
                    currentMesh.rotation.y += 0.01;
                }
                renderer.render(scene, camera);
            }
            animate();
        }
        
        function closeModal3D() {
            document.getElementById('modal3d').classList.remove('active');
            if (renderer) {
                renderer.dispose();
            }
        }
        
        async function loadNFTs() {
            const container = document.getElementById('generationsContainer');
            container.innerHTML = '<div class="loading">Carregando NFTs...</div>';
            
            try {
                const nextId = await contract.nextTokenId();
                const total = Number(nextId) - 1;
                const fusions = await contract.totalFusions();
                
                document.getElementById('totalFusions').textContent = fusions.toString();
                
                if (total === 0) {
                    container.innerHTML = '<div class="loading">Nenhum NFT criado ainda.</div>';
                    return;
                }
                
                let maxGen = 0;
                const entitiesByGeneration = {};
                
                for (let i = 1; i < nextId; i++) {
                    try {
                        const dna = await contract.entityDNA(i);
                        const generation = Number(dna[1]);
                        if (generation > maxGen) maxGen = generation;
                        
                        if (!entitiesByGeneration[generation]) {
                            entitiesByGeneration[generation] = [];
                        }
                        
                        entitiesByGeneration[generation].push({
                            id: i,
                            seed: dna[0].toString(),
                            generation: generation,
                            parent1: Number(dna[2]),
                            parent2: Number(dna[3]),
                            isMutant: dna[4],
                            shapeType: Number(dna[5]),
                            colorIndex: Number(dna[6]),
                            rotation: Number(dna[7]),
                            size: Number(dna[8])
                        });
                    } catch (e) {
                        console.error(`Erro NFT #${i}:`, e);
                    }
                }
                
                container.innerHTML = '';
                
                for (let gen = 1; gen <= maxGen; gen++) {
                    if (!entitiesByGeneration[gen]) continue;
                    
                    const section = document.createElement('div');
                    section.className = 'generation-section';
                    
                    const title = document.createElement('h2');
                    title.className = 'generation-title';
                    title.textContent = `🧬 Geração ${gen} (${entitiesByGeneration[gen].length} NFTs)`;
                    section.appendChild(title);
                    
                    const grid = document.createElement('div');
                    grid.className = 'nft-grid';
                    
                    entitiesByGeneration[gen].forEach(entity => {
                        const card = document.createElement('div');
                        card.className = 'nft-card';
                        card.dataset.tokenId = entity.id;
                        if (entity.isMutant) card.classList.add('mutant');
                        if (selectedNFTs.includes(entity.id)) card.classList.add('selected');
                        
                        card.onclick = () => selectNFT(entity.id);
                        
                        const svg = generateShapeSVG(entity.shapeType, entity.colorIndex, entity.rotation, entity.size, entity.isMutant);
                        
                        card.innerHTML = `
                            <button class="view3d-btn" onclick="event.stopPropagation(); openModal3D(${entity.shapeType}, ${entity.colorIndex}, ${entity.isMutant})">🎥 3D</button>
                            <div class="nft-svg">${svg}</div>
                            <div class="nft-info">
                                <div class="nft-name">NFT #${entity.id}</div>
                                <div class="nft-detail">
                                    <span class="badge badge-gen">Gen ${entity.generation}</span>
                                    ${entity.isMutant ? '<span class="badge badge-mutant">MUTANTE</span>' : ''}
                                </div>
                                <div class="nft-detail">
                                    <span class="badge badge-shape">${shapeNames[entity.shapeType] || 'Desconhecido'}</span>
                                </div>
                                <div class="nft-detail">
                                    <span>🎨 Cor:</span>
                                    <span style="color:${colorPalette[entity.colorIndex]};font-weight:bold;">${colorPalette[entity.colorIndex]}</span>
                                </div>
                                <div class="nft-detail">
                                    <span>🔄 Rotação:</span>
                                    <span>${entity.rotation}°</span>
                                </div>
                                ${entity.parent1 > 0 ? `
                                <div class="nft-detail">
                                    <span>👨‍👩 Pais:</span>
                                    <span>#${entity.parent1} + #${entity.parent2}</span>
                                </div>
                                ` : ''}
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    
                    section.appendChild(grid);
                    container.appendChild(section);
                }
                
                document.getElementById('maxGeneration').textContent = maxGen;
                document.getElementById('totalEntities').textContent = total;
                
            } catch (e) {
                console.error("Erro ao carregar:", e);
                container.innerHTML = '<div class="loading">Erro ao carregar NFTs</div>';
            }
        }
        
        async function mintNFT() {
            if (!window.ethereum) { alert("⚠️ Instale a MetaMask!"); return; }
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const browserProvider = new ethers.BrowserProvider(window.ethereum);
                const signer = await browserProvider.getSigner();
                const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                alert("🎨 Enviando transação...");
                const tx = await userContract.mintEntity({ gasLimit: 500000 });
                alert("⏳ Transação enviada!");
                await tx.wait();
                alert("✅ NFT criado!");
                await loadNFTs();
            } catch (e) {
                alert("❌ Erro: " + e.message);
            }
        }
        
        window.onload = init;
    </script>
</body>
