<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Evolving NFTs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a2e 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; opacity: 0.7; margin-bottom: 30px; }
        
        .wallet-status { 
            text-align: center; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 10px;
        }
        .connected { background: rgba(0, 255, 0, 0.1); border: 1px solid #00ff00; color: #00ff00; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #00ffff; }
        .stat-label { opacity: 0.7; margin-top: 5px; }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: white;
            cursor: pointer;
            font-size: 1.1em;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        
        .fusion-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }
        .fusion-panel.active { display: block; }
        .fusion-title {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ff00ff;
        }
        .fusion-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .fusion-inputs input {
            padding: 12px 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: white;
            font-size: 1.1em;
            width: 120px;
            text-align: center;
        }
        .fusion-inputs input:focus {
            outline: none;
            border-color: #ff00ff;
        }
        .fusion-inputs span {
            font-size: 2em;
            color: #ff00ff;
        }
        .fusion-btn {
            display: block;
            margin: 0 auto;
            padding: 15px 40px;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fusion-btn:hover { transform: scale(1.05); }
        
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .nft-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .nft-card:hover {
            transform: translateY(-5px);
            border-color: #00ffff;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }
        .nft-card.mutant {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        .nft-image {
            width: 100%;
            height: 250px;
            object-fit: contain;
            background: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nft-info { padding: 15px; }
        .nft-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nft-detail {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.9em;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 2px;
        }
        .badge-gen { background: #00ffff; color: black; }
        .badge-mutant { background: #ff00ff; color: white; }
        
        .loading { text-align: center; padding: 50px; font-size: 1.5em; }
        .error { color: #ff4444; text-align: center; padding: 20px; background: rgba(255,0,0,0.1); border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 COSMIC EVOLVING NFTs</h1>
        <p class="subtitle">Mint, Fuse & Watch Evolution</p>
        
        <div class="wallet-status connected" id="walletStatus"> Conectado</div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalEntities">-</div>
                <div class="stat-label">Total de NFTs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalFusions">-</div>
                <div class="stat-label">Total de Fusões</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="maxGeneration">-</div>
                <div class="stat-label">Maior Geração</div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn" onclick="mintNFT()">🎨 MINT NOVO NFT</button>
            <button class="btn" onclick="toggleFusion()">🔥 FUNDIR NFTs</button>
            <button class="btn" onclick="loadNFTs()">🔄 ATUALIZAR</button>
        </div>
        
        <div class="fusion-panel" id="fusionPanel">
            <div class="fusion-title"> Fundir dois NFTs para criar um novo</div>
            <div class="fusion-inputs">
                <input type="number" id="token1" placeholder="ID 1" min="1">
                <span>+</span>
                <input type="number" id="token2" placeholder="ID 2" min="1">
            </div>
            <button class="fusion-btn" onclick="fuseNFTs()">🔥 FUNDIR AGORA</button>
            <p style="text-align:center;margin-top:15px;opacity:0.7;font-size:0.9em;">
                ️ Os NFTs pais serão QUEIMADOS permanentemente!
            </p>
        </div>
        
        <div id="nftGrid" class="nft-grid">
            <div class="loading">Carregando NFTs...</div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x578c1650AB432801839D385A54EAae4f4d7a7A7C";
        const RPC_URL = "https://liteforge.rpc.caldera.xyz/http";
        const CHAIN_ID = 4441;
        
        const ABI = [
            "function mintEntity() external returns (uint256)",
            "function fuseNFTs(uint256 tokenId1, uint256 tokenId2) external returns (uint256)",
            "function nextTokenId() external view returns (uint256)",
            "function totalFusions() external view returns (uint256)",
            "function entityDNA(uint256) external view returns (uint256,uint256,uint256,uint256,bool)",
            "function ownerOf(uint256) external view returns (address)"
        ];
        
        let contract, provider;
        
        async function init() {
            try {
                provider = new ethers.JsonRpcProvider(RPC_URL, { chainId: CHAIN_ID, name: "LitVM" }, { staticNetwork: ethers.Network.from(CHAIN_ID) });
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
                await loadNFTs();
            } catch (e) {
                console.error("Erro na inicialização:", e);
            }
        }
        
        function toggleFusion() {
            const panel = document.getElementById('fusionPanel');
            panel.classList.toggle('active');
        }
        
        async function fuseNFTs() {
            const token1 = parseInt(document.getElementById('token1').value);
            const token2 = parseInt(document.getElementById('token2').value);
            
            if (!token1 || !token2) {
                alert("⚠️ Digite os IDs dos dois NFTs!");
                return;
            }
            
            if (token1 === token2) {
                alert("⚠️ Os NFTs devem ser diferentes!");
                return;
            }
            
            if (!confirm(`🔥 Tem certeza que deseja fundir NFT #${token1} + NFT #${token2}?

Os pais serão QUEIMADOS permanentemente!`)) {
                return;
            }
            
            try {
                if (!window.ethereum) {
                    alert("⚠️ MetaMask não detectada!");
                    return;
                }
                
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                const browserProvider = new ethers.BrowserProvider(window.ethereum);
                const signer = await browserProvider.getSigner();
                const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                alert(`🔥 Fundindo NFT #${token1} + NFT #${token2}...`);
                const tx = await userContract.fuseNFTs(token1, token2, { gasLimit: 2000000 });
                alert(" Transação enviada! Hash: " + tx.hash.substring(0, 30) + "...");
                
                await tx.wait();
                alert("✅ Fusão realizada! Novo NFT criado. Pais queimados.");
                
                document.getElementById('fusionPanel').classList.remove('active');
                document.getElementById('token1').value = '';
                document.getElementById('token2').value = '';
                
                await loadNFTs();
                
            } catch (e) {
                console.error("Erro na fusão:", e);
                alert("❌ Erro na fusão: " + e.message);
            }
        }
        
        async function loadNFTs() {
            const grid = document.getElementById('nftGrid');
            grid.innerHTML = '<div class="loading">Carregando NFTs...</div>';
            
            try {
                const nextId = await contract.nextTokenId();
                const total = Number(nextId) - 1;
                const fusions = await contract.totalFusions();
                
                document.getElementById('totalFusions').textContent = fusions.toString();
                
                if (total === 0) {
                    grid.innerHTML = '<div class="loading">Nenhum NFT criado ainda.</div>';
                    return;
                }
                
                grid.innerHTML = '';
                let maxGen = 0;
                
                for (let i = total; i >= 1; i--) {
                    try {
                        const dna = await contract.entityDNA(i);
                        const generation = Number(dna[1]);
                        const isMutant = dna[4];
                        
                        if (generation > maxGen) maxGen = generation;
                        
                        const seed = dna[0];
                        const r = Number((seed >> 192n) & 0xFFn);
                        const g = Number((seed >> 128n) & 0xFFn);
                        const b = Number((seed >> 64n) & 0xFFn);
                        
                        const card = document.createElement('div');
                        card.className = 'nft-card';
                        if (isMutant) card.classList.add('mutant');
                        
                        card.innerHTML = `
                            <div class="nft-image" style="background: linear-gradient(135deg, rgb(${r},${g},${b}) 0%, rgb(${(r+50)%256},${(g+50)%256},${(b+50)%256}) 100%);">
                                <div style="font-size: 4em;">${isMutant ? '🧬' : '✨'}</div>
                            </div>
                            <div class="nft-info">
                                <div class="nft-name">NFT #${i}</div>
                                <div class="nft-detail">
                                    <span class="badge badge-gen">Gen ${generation}</span>
                                    ${isMutant ? '<span class="badge badge-mutant">MUTANTE</span>' : ''}
                                </div>
                                <div class="nft-detail">
                                    <span>🎨 Cor:</span>
                                    <span style="color:rgb(${r},${g},${b})">RGB(${r},${g},${b})</span>
                                </div>
                                ${Number(dna[2]) > 0 ? `
                                <div class="nft-detail">
                                    <span>‍👩‍ Pais:</span>
                                    <span>#${Number(dna[2])} + #${Number(dna[3])}</span>
                                </div>
                                ` : ''}
                            </div>
                        `;
                        grid.appendChild(card);
                        
                    } catch (e) {
                        console.error(`Erro NFT #${i}:`, e);
                    }
                }
                
                document.getElementById('maxGeneration').textContent = maxGen;
                document.getElementById('totalEntities').textContent = total;
                
            } catch (e) {
                console.error("Erro ao carregar:", e);
                grid.innerHTML = '<div class="error">Erro ao carregar NFTs: ' + e.message + '</div>';
            }
        }
        
        async function mintNFT() {
            if (!window.ethereum) {
                alert("⚠️ Instale a MetaMask!");
                return;
            }
            
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                const browserProvider = new ethers.BrowserProvider(window.ethereum);
                const signer = await browserProvider.getSigner();
                const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                alert("🎨 Enviando transação de mint...");
                const tx = await userContract.mintEntity({ gasLimit: 500000 });
                alert("⏳ Transação enviada! Hash: " + tx.hash.substring(0, 30) + "...");
                
                await tx.wait();
                alert("✅ NFT criado com sucesso!");
                
                await loadNFTs();
                
            } catch (e) {
                console.error("Erro no mint:", e);
                alert(" Erro: " + e.message);
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
