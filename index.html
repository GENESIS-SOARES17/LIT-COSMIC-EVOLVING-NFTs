<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Evolving NFTs - Árvore Genealógica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a2e 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; opacity: 0.7; margin-bottom: 30px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #00ffff; }
        .stat-label { opacity: 0.7; margin-top: 5px; }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: white;
            cursor: pointer;
            font-size: 1.1em;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .fusion-panel {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }
        .fusion-panel.active { display: block; }
        .fusion-title {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ff00ff;
        }
        .selected-nfts {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .selected-nft {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            min-width: 150px;
            text-align: center;
        }
        .selected-nft.empty {
            border-style: dashed;
            opacity: 0.5;
        }
        .fusion-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fusion-btn:hover { transform: scale(1.05); }
        .fusion-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .nft-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        .nft-card:hover {
            transform: translateY(-5px);
            border-color: #00ffff;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }
        .nft-card.selected {
            border-color: #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
            transform: scale(1.02);
        }
        .nft-card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff00ff;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
        }
        .nft-card.mutant {
            border-color: #ff00ff;
        }
        .nft-image {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
        }
        .nft-info { padding: 15px; }
        .nft-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nft-detail {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.9em;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 2px;
        }
        .badge-gen { background: #00ffff; color: black; }
        .badge-mutant { background: #ff00ff; color: white; }
        
        .loading { text-align: center; padding: 50px; font-size: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 ÁRVORE GENEALÓGICA CÓSMICA</h1>
        <p class="subtitle">Selecione 2 NFTs para fundir e criar um novo</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalEntities">-</div>
                <div class="stat-label">Total de NFTs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalFusions">-</div>
                <div class="stat-label">Total de Fusões</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="maxGeneration">-</div>
                <div class="stat-label">Maior Geração</div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn" onclick="mintNFT()">🎨 MINT NOVO NFT</button>
            <button class="btn" onclick="toggleFusionMode()">🔥 MODO FUSÃO</button>
            <button class="btn" onclick="loadNFTs()">🔄 ATUALIZAR</button>
        </div>
        
        <div class="fusion-panel" id="fusionPanel">
            <div class="fusion-title">🔥 Selecione 2 NFTs para fundir</div>
            <div class="selected-nfts">
                <div class="selected-nft empty" id="selected1">
                    <div style="font-size: 2em;">?</div>
                    <div>NFT 1</div>
                </div>
                <div style="font-size: 2em;">+</div>
                <div class="selected-nft empty" id="selected2">
                    <div style="font-size: 2em;">?</div>
                    <div>NFT 2</div>
                </div>
            </div>
            <button class="fusion-btn" id="fuseBtn" onclick="fuseNFTs()" disabled>
                🔥 FUNDIR NFTs SELECIONADOS
            </button>
            <p style="text-align:center;margin-top:15px;opacity:0.7;">
                💡 Clique nos cards abaixo para selecionar os NFTs
            </p>
        </div>
        
        <div id="nftGrid" class="nft-grid">
            <div class="loading">Carregando NFTs...</div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0x19A88C98996c9b9E772028408250F23F1400F7";
        const RPC_URL = "https://liteforge.rpc.caldera.xyz/http";
        const CHAIN_ID = 4441;
        
        const ABI = [
            "function mintEntity() external returns (uint256)",
            "function fuseNFTs(uint256 tokenId1, uint256 tokenId2) external returns (uint256)",
            "function nextTokenId() external view returns (uint256)",
            "function totalFusions() external view returns (uint256)",
            "function entityDNA(uint256) external view returns (uint256,uint256,uint256,uint256,bool)",
            "function ownerOf(uint256) external view returns (address)"
        ];
        
        let contract, provider;
        let fusionMode = false;
        let selectedNFTs = [];
        
        async function init() {
            provider = new ethers.JsonRpcProvider(RPC_URL, { chainId: CHAIN_ID, name: "LitVM" }, { staticNetwork: ethers.Network.from(CHAIN_ID) });
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
            await loadNFTs();
        }
        
        function toggleFusionMode() {
            fusionMode = !fusionMode;
            const panel = document.getElementById('fusionPanel');
            panel.classList.toggle('active', fusionMode);
            
            if (!fusionMode) {
                selectedNFTs = [];
                updateSelectedDisplay();
            }
        }
        
        function selectNFT(tokenId) {
            if (!fusionMode) return;
            
            const index = selectedNFTs.indexOf(tokenId);
            if (index > -1) {
                selectedNFTs.splice(index, 1);
            } else {
                if (selectedNFTs.length >= 2) {
                    selectedNFTs.shift();
                }
                selectedNFTs.push(tokenId);
            }
            
            updateSelectedDisplay();
            updateCardSelection();
        }
        
        function updateSelectedDisplay() {
            const sel1 = document.getElementById('selected1');
            const sel2 = document.getElementById('selected2');
            const fuseBtn = document.getElementById('fuseBtn');
            
            if (selectedNFTs.length >= 1) {
                sel1.innerHTML = `<div style="font-size: 1.5em;">✨</div><div>NFT #${selectedNFTs[0]}</div>`;
                sel1.classList.remove('empty');
            } else {
                sel1.innerHTML = `<div style="font-size: 2em;">?</div><div>NFT 1</div>`;
                sel1.classList.add('empty');
            }
            
            if (selectedNFTs.length >= 2) {
                sel2.innerHTML = `<div style="font-size: 1.5em;">✨</div><div>NFT #${selectedNFTs[1]}</div>`;
                sel2.classList.remove('empty');
                fuseBtn.disabled = false;
            } else {
                sel2.innerHTML = `<div style="font-size: 2em;">?</div><div>NFT 2</div>`;
                sel2.classList.add('empty');
                fuseBtn.disabled = true;
            }
        }
        
        function updateCardSelection() {
            document.querySelectorAll('.nft-card').forEach(card => {
                const tokenId = parseInt(card.dataset.tokenId);
                card.classList.toggle('selected', selectedNFTs.includes(tokenId));
            });
        }
        
        async function fuseNFTs() {
            if (selectedNFTs.length !== 2) {
                alert("⚠️ Selecione exatamente 2 NFTs!");
                return;
            }
            
            const [token1, token2] = selectedNFTs;
            
            if (!confirm(`🔥 Fundir NFT #${token1} + NFT #${token2}?\n\nUm novo NFT filho será criado!`)) {
                return;
            }
            
            try {
                if (!window.ethereum) {
                    alert("⚠️ MetaMask não detectada!");
                    return;
                }
                
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const browserProvider = new ethers.BrowserProvider(window.ethereum);
                const signer = await browserProvider.getSigner();
                const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                alert(`🔥 Fundindo NFT #${token1} + NFT #${token2}...`);
                const tx = await userContract.fuseNFTs(token1, token2, { gasLimit: 500000 });
                alert("⏳ Transação enviada!");
                
                await tx.wait();
                alert("✅ Fusão realizada! Novo NFT criado.");
                
                selectedNFTs = [];
                updateSelectedDisplay();
                await loadNFTs();
                
            } catch (e) {
                alert("❌ Erro: " + e.message);
            }
        }
        
        async function loadNFTs() {
            const grid = document.getElementById('nftGrid');
            grid.innerHTML = '<div class="loading">Carregando NFTs...</div>';
            
            try {
                const nextId = await contract.nextTokenId();
                const total = Number(nextId) - 1;
                const fusions = await contract.totalFusions();
                
                document.getElementById('totalFusions').textContent = fusions.toString();
                
                if (total === 0) {
                    grid.innerHTML = '<div class="loading">Nenhum NFT criado ainda.</div>';
                    return;
                }
                
                grid.innerHTML = '';
                let maxGen = 0;
                
                for (let i = total; i >= 1; i--) {
                    try {
                        const dna = await contract.entityDNA(i);
                        const generation = Number(dna[1]);
                        const isMutant = dna[4];
                        
                        if (generation > maxGen) maxGen = generation;
                        
                        const seed = dna[0];
                        const r = Number((seed >> 192n) & 0xFFn);
                        const g = Number((seed >> 128n) & 0xFFn);
                        const b = Number((seed >> 64n) & 0xFFn);
                        
                        const card = document.createElement('div');
                        card.className = 'nft-card';
                        card.dataset.tokenId = i;
                        if (isMutant) card.classList.add('mutant');
                        if (selectedNFTs.includes(i)) card.classList.add('selected');
                        
                        card.onclick = () => selectNFT(i);
                        
                        card.innerHTML = `
                            <div class="nft-image" style="background: linear-gradient(135deg, rgb(${r},${g},${b}) 0%, rgb(${(r+50)%256},${(g+50)%256},${(b+50)%256}) 100%);">
                                ${isMutant ? '🧬' : '✨'}
                            </div>
                            <div class="nft-info">
                                <div class="nft-name">NFT #${i}</div>
                                <div class="nft-detail">
                                    <span class="badge badge-gen">Gen ${generation}</span>
                                    ${isMutant ? '<span class="badge badge-mutant">MUTANTE</span>' : ''}
                                </div>
                                <div class="nft-detail">
                                    <span>🎨 Cor:</span>
                                    <span style="color:rgb(${r},${g},${b})">RGB(${r},${g},${b})</span>
                                </div>
                                ${Number(dna[2]) > 0 ? `
                                <div class="nft-detail">
                                    <span>👨‍👩‍ Pais:</span>
                                    <span>#${Number(dna[2])} + #${Number(dna[3])}</span>
                                </div>
                                ` : ''}
                            </div>
                        `;
                        grid.appendChild(card);
                        
                    } catch (e) {
                        console.error(`Erro NFT #${i}:`, e);
                    }
                }
                
                document.getElementById('maxGeneration').textContent = maxGen;
                document.getElementById('totalEntities').textContent = total;
                
            } catch (e) {
                grid.innerHTML = '<div class="loading">Erro ao carregar NFTs</div>';
            }
        }
        
        async function mintNFT() {
            if (!window.ethereum) {
                alert("⚠️ Instale a MetaMask!");
                return;
            }
            
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const browserProvider = new ethers.BrowserProvider(window.ethereum);
                const signer = await browserProvider.getSigner();
                const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                alert("🎨 Enviando transação de mint...");
                const tx = await userContract.mintEntity({ gasLimit: 500000 });
                alert("⏳ Transação enviada!");
                
                await tx.wait();
                alert("✅ NFT criado!");
                
                await loadNFTs();
                
            } catch (e) {
                alert("❌ Erro: " + e.message);
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
