<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Geometric NFTs - Visualização 3D Interativa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .ui-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }
        
        .ui-overlay > * {
            pointer-events: auto;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        
        @keyframes shimmer {
            to { background-position: 200% center; }
        }
        
        .controls-panel {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            max-width: 400px;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .control-group select,
        .control-group input[type="range"] {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        .btn.export {
            background: linear-gradient(90deg, #ff6600, #ff0066);
        }
        
        .shape-info {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            max-width: 300px;
        }
        
        .mutation-badge {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(90deg, #ff00ff, #ff6600);
            border-radius: 20px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 255, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 255, 0.9); }
        }
        
        .layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5em;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Carregando visualização 3D...</div>
    
    <canvas id="particles-canvas"></canvas>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <div class="header">
            <h1>🎨 COSMIC GEOMETRIC NFTs - 3D Viewer</h1>
            <p>Arraste para rotacionar • Scroll para zoom • Clique para animar</p>
        </div>
        
        <div class="layout">
            <div class="controls-panel">
                <h3>🎛️ Controles</h3>
                
                <div class="control-group">
                    <label>Forma Geométrica</label>
                    <select id="shape-select">
                        <option value="0">Triângulo</option>
                        <option value="1">Quadrado</option>
                        <option value="2">Retângulo</option>
                        <option value="3">Círculo</option>
                        <option value="4">Losango</option>
                        <option value="5">Trapézio</option>
                        <option value="6">Paralelogramo</option>
                        <option value="7">Pentágono</option>
                        <option value="8">Hexágono</option>
                        <option value="9">Heptágono</option>
                        <option value="10">Octógono</option>
                        <option value="11">Decágono</option>
                        <option value="12">Dodecágono</option>
                        <option value="13">Elipse</option>
                        <option value="14">Cubo</option>
                        <option value="15">Esfera</option>
                        <option value="16">Cilindro</option>
                        <option value="17">Cone</option>
                        <option value="18">Pirâmide</option>
                        <option value="19">Prisma Triangular</option>
                        <option value="20">Paralelepípedo</option>
                        <option value="21">Tetraedro</option>
                        <option value="22">Octaedro</option>
                        <option value="23">Dodecaedro</option>
                        <option value="24">Icosaedro</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Cor</label>
                    <select id="color-select">
                        <option value="#DC143C">Vermelho Carmim</option>
                        <option value="#FF2400">Vermelho Escarlate</option>
                        <option value="#E2725B">Terracota</option>
                        <option value="#FF00FF">Magenta</option>
                        <option value="#FF6EC7">Rosa Choque</option>
                        <option value="#FFB6C1">Rosa Bebê</option>
                        <option value="#FA8072">Salmão</option>
                        <option value="#FF7F50">Coral</option>
                        <option value="#FFBF00">Âmbar</option>
                        <option value="#FFEF00">Amarelo Canário</option>
                        <option value="#E1AD01">Amarelo Mostarda</option>
                        <option value="#FF9933">Laranja Cenoura</option>
                        <option value="#FFFDD0">Creme/Marfim</option>
                        <option value="#FFD700">Ouro/Dourado</option>
                        <option value="#50C878">Verde Esmeralda</option>
                        <option value="#808000">Verde Oliva</option>
                        <option value="#8A9A5B">Verde Musgo</option>
                        <option value="#98FF98">Verde Menta</option>
                        <option value="#4B5320">Verde Militar</option>
                        <option value="#BFFF00">Verde Lima</option>
                        <option value="#00FFFF">Ciano/Verde-Água</option>
                        <option value="#000080">Azul Marinho</option>
                        <option value="#0047AB">Azul Cobalto</option>
                        <option value="#40E0D0">Azul Turquesa</option>
                        <option value="#89CFF0">Azul Bebê/Celeste</option>
                        <option value="#005F69">Azul Petróleo</option>
                        <option value="#4B0082">Azul Índigo/Anil</option>
                        <option value="#4169E1">Azul Royal</option>
                        <option value="#8B00FF">Roxo/Violeta</option>
                        <option value="#E6E6FA">Lavanda/Lilás</option>
                        <option value="#800080">Púrpura</option>
                        <option value="#301934">Berinjela</option>
                        <option value="#DA70D6">Orquídea</option>
                        <option value="#7B3F00">Marrom Chocolate</option>
                        <option value="#F5F5DC">Bege</option>
                        <option value="#C3B091">Cáqui</option>
                        <option value="#FFD59A">Caramelo</option>
                        <option value="#704214">Sépia</option>
                        <option value="#CD7F32">Bronze</option>
                        <option value="#FFFFFF">Branco Neve</option>
                        <option value="#FAF9F6">Off-White</option>
                        <option value="#C0C0C0">Cinza Claro/Prata</option>
                        <option value="#464646">Cinza Chumbo</option>
                        <option value="#000000">Preto Absoluto</option>
                        <option value="#383838">Grafite</option>
                        <option value="#722F37">Vinho/Bordô</option>
                        <option value="#E3BC9A">Nude</option>
                        <option value="#FF00FF">Fúcsia</option>
                        <option value="#008080">Turmalina</option>
                        <option value="#F3E5AB">Amarelo Baunilha</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Velocidade de Rotação</label>
                    <input type="range" id="rotation-speed" min="0" max="100" value="30">
                </div>
                
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="is-mutant"> Modo Mutante (Efeitos Especiais)
                    </label>
                </div>
                
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="auto-rotate" checked> Rotação Automática
                    </label>
                </div>
                
                <button class="btn" onclick="toggleAnimation()">▶️ Play/Pause Animação</button>
                <button class="btn export" onclick="exportGIF()">📸 Exportar GIF Animado</button>
            </div>
            
            <div class="shape-info" id="shape-info">
                <h3 id="shape-name">Triângulo</h3>
                <p id="shape-desc">Polígono de 3 lados e 3 ângulos internos.</p>
                <div id="mutation-status"></div>
                <hr style="margin: 10px 0; border-color: rgba(255,255,255,0.2);">
                <p><strong>Dica:</strong> Arraste para rotacionar a forma em 3D!</p>
            </div>
        </div>
    </div>

    <script>
        // ===== SISTEMA DE PARTÍCULAS =====
        const particlesCanvas = document.getElementById('particles-canvas');
        const pCtx = particlesCanvas.getContext('2d');
        let particles = [];
        
        function resizeParticles() {
            particlesCanvas.width = window.innerWidth;
            particlesCanvas.height = window.innerHeight;
        }
        resizeParticles();
        window.addEventListener('resize', resizeParticles);
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * particlesCanvas.width;
                this.y = Math.random() * particlesCanvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = `hsl(${Math.random() * 60 + 240}, 100%, 70%)`;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > particlesCanvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > particlesCanvas.height) this.speedY *= -1;
            }
            
            draw() {
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                pCtx.fillStyle = this.color;
                pCtx.globalAlpha = this.opacity;
                pCtx.fill();
                pCtx.globalAlpha = 1;
            }
        }
        
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }
        
        function animateParticles() {
            pCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        // ===== THREE.JS 3D VIEWER =====
        let scene, camera, renderer, controls, mesh, ambientLight, directionalLight, pointLight1, pointLight2;
        let isAnimating = true;
        let rotationSpeed = 0.01;
        let isMutant = false;
        let animationId;
        
        const shapeDescriptions = {
            0: "Triângulo: Polígono de 3 lados e 3 ângulos internos.",
            1: "Quadrado: Polígono de 4 lados iguais e 4 ângulos retos (90°).",
            2: "Retângulo: Quadrilátero com lados opostos iguais e 4 ângulos retos.",
            3: "Círculo: Região plana limitada por uma circunferência.",
            4: "Losango: Quadrilátero com os 4 lados iguais (formato de diamante).",
            5: "Trapézio: Quadrilátero que possui dois lados paralelos (bases).",
            6: "Paralelogramo: Quadrilátero com lados opostos paralelos e iguais.",
            7: "Pentágono: Polígono regular ou irregular com 5 lados.",
            8: "Hexágono: Polígono com 6 lados (comum em colmeias).",
            9: "Heptágono: Polígono que possui 7 lados.",
            10: "Octógono: Polígono com 8 lados (famoso pelo ringue do UFC).",
            11: "Decágono: Polígono que possui 10 lados.",
            12: "Dodecágono: Polígono composto por 12 lados.",
            13: "Elipse: Uma figura oval alongada, semelhante à órbita dos planetas.",
            14: "Cubo: Sólido geométrico com 6 faces quadradas idênticas.",
            15: "Esfera: Sólido perfeitamente redondo, todos os pontos à mesma distância do centro.",
            16: "Cilindro: Sólido com duas bases circulares paralelas e superfície lateral curva.",
            17: "Cone: Possui uma base circular que se afunila até um vértice.",
            18: "Pirâmide Quadrangular: Sólido com base quadrada e faces triangulares no topo.",
            19: "Prisma Triangular: Possui duas bases triangulares paralelas ligadas por faces retangulares.",
            20: "Paralelepípedo: Sólido com 6 faces retangulares (como uma caixa).",
            21: "Tetraedro: Pirâmide formada por 4 faces triangulares (sólido platônico).",
            22: "Octaedro: Sólido regular com 8 faces triangulares.",
            23: "Dodecaedro: Sólido geométrico com 12 faces pentagonais.",
            24: "Icosaedro: Sólido composto por 20 faces triangulares (dado de RPG)."
        };
        
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;
            
            ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            pointLight1 = new THREE.PointLight(0xff00ff, 0.5, 100);
            pointLight1.position.set(-5, 3, 0);
            scene.add(pointLight1);
            
            pointLight2 = new THREE.PointLight(0x00ffff, 0.5, 100);
            pointLight2.position.set(5, -3, 0);
            scene.add(pointLight2);
            
            createShape(0, '#DC143C');
            
            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('loading').style.display = 'none';
            
            animate();
        }
        
        function createShape(shapeType, color) {
            if (mesh) {
                scene.remove(mesh);
                mesh.geometry.dispose();
                mesh.material.dispose();
            }
            
            let geometry;
            const size = 2;
            
            switch(parseInt(shapeType)) {
                case 0: geometry = new THREE.ConeGeometry(size, size * 1.5, 3); break;
                case 1: geometry = new THREE.BoxGeometry(size * 1.5, size * 1.5, size * 1.5); break;
                case 2: geometry = new THREE.BoxGeometry(size * 2, size, size * 0.5); break;
                case 3: geometry = new THREE.CircleGeometry(size, 32); break;
                case 4: geometry = new THREE.OctahedronGeometry(size, 0); break;
                case 5:
                    const trapShape = new THREE.Shape();
                    trapShape.moveTo(-size, -size);
                    trapShape.lineTo(size, -size);
                    trapShape.lineTo(size * 0.7, size);
                    trapShape.lineTo(-size * 0.7, size);
                    trapShape.closePath();
                    const trapExtrudeSettings = { depth: size * 0.5, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1 };
                    geometry = new THREE.ExtrudeGeometry(trapShape, trapExtrudeSettings);
                    break;
                case 6:
                    const paraShape = new THREE.Shape();
                    paraShape.moveTo(-size, -size);
                    paraShape.lineTo(size * 0.5, -size);
                    paraShape.lineTo(size, size);
                    paraShape.lineTo(-size * 0.5, size);
                    paraShape.closePath();
                    const paraExtrudeSettings = { depth: size * 0.5, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1 };
                    geometry = new THREE.ExtrudeGeometry(paraShape, paraExtrudeSettings);
                    break;
                case 7: geometry = new THREE.CylinderGeometry(size, size, size * 0.5, 5); break;
                case 8: geometry = new THREE.CylinderGeometry(size, size, size * 0.5, 6); break;
                case 9: geometry = new THREE.CylinderGeometry(size, size, size * 0.5, 7); break;
                case 10: geometry = new THREE.CylinderGeometry(size, size, size * 0.5, 8); break;
                case 11: geometry = new THREE.CylinderGeometry(size, size, size * 0.5, 10); break;
                case 12: geometry = new THREE.CylinderGeometry(size, size, size * 0.5, 12); break;
                case 13:
                    geometry = new THREE.SphereGeometry(size, 32, 16);
                    geometry.scale(1.5, 0.7, 1);
                    break;
                case 14: geometry = new THREE.BoxGeometry(size * 1.5, size * 1.5, size * 1.5); break;
                case 15: geometry = new THREE.SphereGeometry(size, 32, 32); break;
                case 16: geometry = new THREE.CylinderGeometry(size * 0.7, size * 0.7, size * 2, 32); break;
                case 17: geometry = new THREE.ConeGeometry(size, size * 2, 32); break;
                case 18: geometry = new THREE.ConeGeometry(size * 1.2, size * 2, 4); break;
                case 19: geometry = new THREE.CylinderGeometry(size, size, size * 2, 3); break;
                case 20: geometry = new THREE.BoxGeometry(size * 2, size * 1.5, size); break;
                case 21: geometry = new THREE.TetrahedronGeometry(size); break;
                case 22: geometry = new THREE.OctahedronGeometry(size); break;
                case 23: geometry = new THREE.DodecahedronGeometry(size); break;
                case 24: geometry = new THREE.IcosahedronGeometry(size); break;
                default: geometry = new THREE.SphereGeometry(size, 32, 32);
            }
            
            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color(color),
                metalness: 0.3,
                roughness: 0.4,
                emissive: isMutant ? new THREE.Color(color) : new THREE.Color(0x000000),
                emissiveIntensity: isMutant ? 0.5 : 0
            });
            
            mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            const wireframeMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                wireframe: true,
                transparent: true,
                opacity: 0.1
            });
            const wireframe = new THREE.Mesh(geometry, wireframeMaterial);
            mesh.add(wireframe);
            
            scene.add(mesh);
            
            document.getElementById('shape-name').textContent = document.getElementById('shape-select').options[shapeType].text;
            document.getElementById('shape-desc').textContent = shapeDescriptions[shapeType];
            
            if (isMutant) {
                document.getElementById('mutation-status').innerHTML = '<span class="mutation-badge">🧬 MUTANTE</span>';
                pointLight1.color.set(0xff00ff);
                pointLight2.color.set(0xff6600);
            } else {
                document.getElementById('mutation-status').innerHTML = '';
                pointLight1.color.set(0xff00ff);
                pointLight2.color.set(0x00ffff);
            }
        }
        
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            if (isAnimating && mesh) {
                const speed = rotationSpeed;
                mesh.rotation.x += speed * 0.5;
                mesh.rotation.y += speed;
                mesh.rotation.z += speed * 0.3;
                
                if (isMutant) {
                    const scale = 1 + Math.sin(Date.now() * 0.005) * 0.1;
                    mesh.scale.set(scale, scale, scale);
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ===== CONTROLES UI =====
        document.getElementById('shape-select').addEventListener('change', (e) => {
            const color = document.getElementById('color-select').value;
            createShape(e.target.value, color);
        });
        
        document.getElementById('color-select').addEventListener('change', (e) => {
            const shape = document.getElementById('shape-select').value;
            createShape(shape, e.target.value);
        });
        
        document.getElementById('rotation-speed').addEventListener('input', (e) => {
            rotationSpeed = e.target.value / 1000;
        });
        
        document.getElementById('is-mutant').addEventListener('change', (e) => {
            isMutant = e.target.checked;
            const shape = document.getElementById('shape-select').value;
            const color = document.getElementById('color-select').value;
            createShape(shape, color);
        });
        
        document.getElementById('auto-rotate').addEventListener('change', (e) => {
            controls.autoRotate = e.target.checked;
        });
        
        function toggleAnimation() {
            isAnimating = !isAnimating;
        }
        
        function exportGIF() {
            alert('📸 Exportando GIF animado...\n\nNota: Para exportação real de GIF, seria necessário implementar gif.js com frames capturados do canvas.\n\nFuncionalidade demonstrativa: Salve frames manualmente ou use ferramentas de screen recording.');
            
            const frames = [];
            const originalRotation = mesh.rotation.y;
            
            for (let i = 0; i < 30; i++) {
                mesh.rotation.y += 0.2;
                renderer.render(scene, camera);
                frames.push(renderer.domElement.toDataURL('image/png'));
            }
            
            mesh.rotation.y = originalRotation;
            
            console.log('Frames capturados:', frames.length);
            alert(`✅ ${frames.length} frames capturados! Em uma implementação completa, estes seriam convertidos em GIF.`);
        }
        
        // Inicializar
        initThreeJS();
    </script>
</body>
</html>
